model:
  model_name: "vit_large_patch14_clip_224.openai_ft_in1k"
  weights_path: null          # null = download from timm hub; or local .safetensors path
  target_layers: null         # null = all layers present in lens dirs; or e.g. [6, 12, 18, 23]

lens:
  cls_lens_dir: "outputs/affine_kld/best_lenses"
  patch_lens_dir: "outputs/patch_affine_kld/best_lenses"
  patch_map_dir: "outputs/patch_map_lowrank/best_maps"           # directory with layer_*.pt patch map checkpoints (for patch_map_cls scorer)
  patch_neighbor_size: 3      # must match training config (k)
  patch_border: 2             # must match training config
  means_path: ""  # required when scorer_type includes "cls"

eval:
  image_paths: []             # explicit image file paths (takes precedence over image_dir)
  image_dir: "/opt/models/datasets/imagenet/extracted/val"  # ImageNet val split (same root as tuned_lens configs)
  num_images: 500            # null = all; or set e.g. 5000 to limit evaluation
  num_save_images: 20         # save PNGs/metrics.json for this many random images; null = save all
  output_dir: "outputs/attribution"
  device: "cuda"              # "cuda" or "cpu"
  scorer_type: "patch_map_cls"         # "cls" | "patch" | "both" | "patch_map_cls" | "all"
  blur_kernel_size: 55        # Gaussian blur kernel for insertion/deletion baseline
  blur_sigma: 10.0
  perturbation_batch_size: 2048  # perturbed images per forward pass in insertion/deletion curves
  extraction_batch_size: 8       # images batched together for feature extraction
  heatmap_colormap: "hot"
  heatmap_alpha: 0.6
  plot_dpi: 150

seed: 42
